<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keranjang — 9club</title>
<link rel="icon" href="assets/img/logo-9club-white.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css?v=1">
</head>
<body>
<div id="site-header"></div>

<div class="page-head">
  <div class="wrap">
    <div class="breadcrumb"><a href="index.html">Home</a> / Keranjang</div>
    <h1>Keranjang Belanja</h1>
  </div>
</div>

<div class="wrap">
  <div id="cart-root"></div>
</div>

<div id="site-footer"></div>

<script src="assets/js/auth.js?v=1"></script>
<script src="assets/js/products.js?v=1"></script>
<script src="assets/js/main.js?v=1"></script>
<script>
  mountHeader(); mountFooter();
  const SHIP = 20000;

  function render(){
    const items = Cart.get();
    const root = document.getElementById('cart-root');
    if(!items.length){
      root.innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 7h13l-1.3 10.5a2 2 0 0 1-2 1.5H9.3a2 2 0 0 1-2-1.5L6 7Z"/><path d="M9 7V5.5a3 3 0 0 1 6 0V7"/></svg>
        <h3>Keranjangmu kosong</h3>
        <p style="margin-bottom:20px">Belum ada produk. Yuk lihat koleksi Drop 1.</p>
        <a href="katalog.html" class="btn btn-dark">Lihat Collection</a></div>`;
      return;
    }
    const sub = Cart.total();
    root.innerHTML = `<div class="cart-layout">
      <div>
        ${items.map(it=>`
          <div class="cart-item">
            <a class="thumb" href="produk.html?id=${it.id}"><img src="${it.img}" alt=""></a>
            <div>
              <h3>${it.name}</h3>
              <div class="meta">Ukuran: ${it.size}</div>
              <div class="qty">
                <button data-a="dec" data-id="${it.id}" data-s="${it.size}">−</button>
                <span>${it.qty}</span>
                <button data-a="inc" data-id="${it.id}" data-s="${it.size}">+</button>
              </div>
              <div class="remove" data-a="rm" data-id="${it.id}" data-s="${it.size}" style="cursor:pointer">Hapus</div>
            </div>
            <div class="price">${rupiah(it.price*it.qty)}</div>
          </div>`).join('')}
      </div>
      <div class="summary">
        <h3>Ringkasan</h3>
        <div class="summary-row"><span>Subtotal</span><span>${rupiah(sub)}</span></div>
        <div class="summary-row"><span>Ongkir</span><span>${rupiah(SHIP)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${rupiah(sub+SHIP)}</span></div>
        <a href="pembayaran.html" class="btn btn-dark btn-block" style="margin-top:18px">Lanjut ke Pembayaran</a>
        <a href="katalog.html" class="btn btn-ghost btn-block" style="margin-top:10px">Lanjut Belanja</a>
      </div>
    </div>`;

    root.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{
      const {a,id,s}=b.dataset; const it=Cart.get().find(i=>i.id===id&&i.size===s);
      if(a==='inc')Cart.setQty(id,s,it.qty+1);
      if(a==='dec')Cart.setQty(id,s,it.qty-1);
      if(a==='rm')Cart.remove(id,s);
      render();
    });
  }
  render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kelola Artikel — 9club Admin</title>
<link rel="icon" href="../assets/img/logo-9club-white.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css?v=1">
<link rel="stylesheet" href="../assets/css/admin.css?v=1">
</head>
<body class="admin-body">
<div class="admin">
  <aside class="side" id="side"></aside>
  <div class="admin-main">
    <div class="topbar" id="topbar"></div>
    <div class="admin-content">
      <div class="panel">
        <div class="panel-head">
          <h2>Daftar Artikel</h2>
          <button class="btn btn-dark btn-sm" onclick="editArticle()">+ Tambah Artikel</button>
        </div>
        <div class="table-wrap"><table class="tbl">
          <thead><tr><th>Judul</th><th>Kategori</th><th>Tanggal</th><th style="text-align:right">Aksi</th></tr></thead>
          <tbody id="rows"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/articles.js?v=1"></script>
<script src="../assets/js/auth.js?v=1"></script>
<script src="../assets/js/admin.js?v=1"></script>
<script>
  mountAdmin('artikel','Kelola Artikel','Kelola konten journal 9club');
  let list = adminArticles();
  function save(){ Store.set('9club_admin_articles', list); }

  function draw(){
    document.getElementById('rows').innerHTML = list.map((a,i)=>`
      <tr>
        <td><div class="cell-prod"><img src="${a.cover}" style="width:56px;height:40px;border-radius:6px"><div><b>${a.title}</b><small>${a.id}</small></div></div></td>
        <td><span class="pill blue">${a.category}</span></td>
        <td>${a.date}</td>
        <td><div class="act-btns" style="justify-content:flex-end">
          <button class="icon-act" onclick="editArticle(${i})" aria-label="Edit">${AICON.edit}</button>
          <button class="icon-act del" onclick="delArticle(${i})" aria-label="Hapus">${AICON.trash}</button>
        </div></td>
      </tr>`).join('') || '<tr><td colspan="4" style="padding:24px;color:var(--olive)">Belum ada artikel.</td></tr>';
  }
  function editArticle(i){
    const a = i!=null ? list[i] : {title:'',category:'Story',date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}),cover:'../assets/img/products/jorts-blue-1.jpg'};
    openModal(i!=null?'Edit Artikel':'Tambah Artikel', `
      <div class="field"><label>Judul</label><input id="f-title" value="${a.title}"></div>
      <div class="field"><label>Kategori</label><select id="f-cat">
        ${['Story','Style Guide','Material','Care'].map(c=>`<option ${c===a.category?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Tanggal</label><input id="f-date" value="${a.date}"></div>`,
      ()=>{
        const data={
          id:a.id||('art-'+Date.now()),
          title:document.getElementById('f-title').value||'Tanpa judul',
          category:document.getElementById('f-cat').value,
          date:document.getElementById('f-date').value,
          cover:a.cover
        };
        if(i!=null) list[i]=data; else list.unshift(data);
        save(); draw(); closeModal();
      });
  }
  function delArticle(i){ if(confirm('Hapus artikel "'+list[i].title+'"?')){ list.splice(i,1); save(); draw(); } }
  draw();
</script>
</body>
</html>

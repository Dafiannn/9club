<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kelola Transaksi — 9club Admin</title>
<link rel="icon" href="../assets/img/logo-9club-white.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css?v=1">
<link rel="stylesheet" href="../assets/css/admin.css?v=1">
</head>
<body class="admin-body">
<div class="admin">
  <aside class="side" id="side"></aside>
  <div class="admin-main">
    <div class="topbar" id="topbar"></div>
    <div class="admin-content">
      <div class="stats" id="stats"></div>
      <div class="panel">
        <div class="panel-head">
          <h2>Semua Transaksi</h2>
          <div class="filters" id="filters"></div>
        </div>
        <div class="table-wrap"><table class="tbl">
          <thead><tr><th>Order ID</th><th>Tanggal</th><th>Produk</th><th>Metode</th><th>Total</th><th>Status</th></tr></thead>
          <tbody id="rows"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script src="../assets/js/products.js?v=1"></script>
<script src="../assets/js/auth.js?v=1"></script>
<script src="../assets/js/admin.js?v=1"></script>
<script>
  mountAdmin('transaksi','Kelola Transaksi','Pantau & ubah status pesanan');
  let orders = adminOrders();
  const statusPill={paid:'green',pending:'amber',shipped:'blue'};
  const statusTxt={paid:'Dibayar',pending:'Menunggu',shipped:'Dikirim'};
  let filter='all';

  function drawStats(){
    const paid=orders.filter(o=>o.status==='paid').length;
    const pending=orders.filter(o=>o.status==='pending').length;
    const rev=orders.reduce((n,o)=>n+o.total,0);
    document.getElementById('stats').innerHTML=[
      {ic:AICON.cart,num:orders.length,lbl:'Total Order'},
      {ic:AICON.money,num:rupiah(rev),lbl:'Total Nilai'},
      {ic:AICON.box,num:paid,lbl:'Sudah Dibayar'},
      {ic:AICON.doc,num:pending,lbl:'Menunggu'}
    ].map(s=>`<div class="stat"><div class="ic">${s.ic}</div><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('');
  }

  function draw(){
    drawStats();
    document.getElementById('filters').innerHTML=['all','paid','pending','shipped'].map(f=>
      `<button class="chip ${f===filter?'active':''}" onclick="setF('${f}')">${f==='all'?'Semua':statusTxt[f]}</button>`).join('');
    const list=orders.filter(o=>filter==='all'||o.status===filter);
    document.getElementById('rows').innerHTML=list.map((o,idx)=>`
      <tr>
        <td><b>${o.id}</b></td><td>${o.date}</td>
        <td><div class="cell-prod"><img src="${o.items[0].img}"><div><b>${o.items[0].name}</b><small>${o.items.reduce((n,i)=>n+i.qty,0)} item</small></div></div></td>
        <td>${o.pay}</td><td><b>${rupiah(o.total)}</b></td>
        <td><select onchange="setStatus('${o.id}',this.value)" class="pill ${statusPill[o.status]}" style="border:none;font:inherit;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px">
          ${['paid','pending','shipped'].map(s=>`<option value="${s}" ${s===o.status?'selected':''}>${statusTxt[s]}</option>`).join('')}
        </select></td>
      </tr>`).join('') || '<tr><td colspan="6" style="padding:24px;color:var(--olive)">Tidak ada transaksi.</td></tr>';
  }
  function setF(f){ filter=f; draw(); }
  function setStatus(id,val){
    setOrderStatus(id,val);                 // simpan permanen ke store bersama
    const o=orders.find(x=>x.id===id); if(o)o.status=val;
    draw();
  }
  draw();
</script>
</body>
</html>
